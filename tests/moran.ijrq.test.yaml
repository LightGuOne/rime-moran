schema: moran
source_dir: ../dist
script: |
  function eq(left, right)
    print('Left  = ' .. tostring(left))
    print('Right = ' .. tostring(right))
    return left == right
  end

deploy:
  word:
    patch:
      moran/ijrq/enable_word: true
    tests:
      - send: lmjxf
        assert: eq(cand[1].text, "連接") and eq(cand[2].text, "鏈接")

  word_defer_2:
    patch:
      moran/ijrq/enable_word: true
      moran/ijrq/enable_word_defer: 2
    tests:
      - send: lmjxf
        assert: eq(cand[3].text, "鏈接")
      - send: uixmw
        assert: eq(cand[1].text, "實現")
      - send: juuvt
        assert: eq(cand[1].text, "聚水潭")

  word_defer_3:
    patch:
      moran/ijrq/enable_word: true
      moran/ijrq/enable_word_defer: 3
    tests:
      - send: lmjxf
        assert: eq(cand[4].text, "鏈接")
      - send: uixmw
        assert: eq(cand[1].text, "實現")
      - send: juuvt
        assert: eq(cand[1].text, "聚水潭")

